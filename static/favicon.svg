<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a0e17"/>

  <!-- ERC Bullish Candle (Blue - Left) -->
  <!-- Wick top -->
  <line x1="13" y1="8" x2="13" y2="13" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (big = ERC) -->
  <rect x="9" y="13" width="8" height="28" rx="1" fill="#2196F3"/>
  <!-- Wick bottom -->
  <line x1="13" y1="41" x2="13" y2="44" stroke="#2196F3" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow up -->
  <polygon points="13,5 10,10 16,10" fill="#2196F3"/>

  <!-- FERC Candle (Amber - Center) -->
  <!-- Wick top (long = failed) -->
  <line x1="32" y1="6" x2="32" y2="20" stroke="#FFC107" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (medium) -->
  <rect x="28" y="20" width="8" height="18" rx="1" fill="#FFC107"/>
  <!-- Wick bottom (long = failed) -->
  <line x1="32" y1="38" x2="32" y2="52" stroke="#FFC107" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrow up (amber) -->
  <polygon points="32,3 29,8 35,8" fill="#FFC107"/>

  <!-- Base Candle (Green - Right) -->
  <!-- Wick top -->
  <line x1="51" y1="14" x2="51" y2="24" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <!-- Body (small = base) -->
  <rect x="47" y="24" width="8" height="10" rx="1" fill="#4caf50"/>
  <!-- Wick bottom -->
  <line x1="51" y1="34" x2="51" y2="46" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/>
  <!-- Green dot marker -->
  <circle cx="51" cy="50" r="3" fill="#4caf50"/>
</svg>
